<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Website</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box{
            width: 300px;
            margin: 30px auto;
            padding:20px;
            border: 2px solid gray;
            text-align: center;
        }
        .login-box input{
            width: 90%;
            padding: 8px;
        }
        .login-box button{
            padding: 8px 15px;
            background-color: lightblue;
            border: none;
            cursor:pointer;
        }
        .login-box button:hover{
            background-color: orange;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Annamacharya University</h1>
    </div>
    <div class="nav">
        <a href="home.html">Home</a>
         <a href="about.html">About</a>
          <a href="https://youtu.be/6C1M1NW0PvM" target="_blank">Contact</a>
    </div>
    <div class="content">
        <h2>Welcome to my Website</h2>
        <p>This is a simple website layout created using HTML and CSS.</p>
    </div>
    <div class="login-box">
        <h3>Student Login</h3>
        <form>
            <label>Registration Number</label><br>
            <input type="text" placeholder="Enter registration number"><br>
             <label>Password</label><br>
            <input type="Password" placeholder="Enter Password"><br>
            <button type="submit">Login</button>
        </form>
    </div>
</div>
<div class="footer">
    <p>&copy; 2026 My Website</p>
</div>    
</body>
</html>
